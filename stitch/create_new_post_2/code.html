<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffffff",
                        "background-light": "#f6f6f8",
                        "background-dark": "#000000",
                        "surface-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-black text-white min-h-screen">
<div class="max-w-[430px] mx-auto min-h-screen bg-black relative flex flex-col">
<div class="flex justify-between items-center px-8 py-3 w-full text-white">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center space-x-1.5">
<span class="material-icons-outlined text-sm">signal_cellular_alt</span>
<span class="material-icons-outlined text-sm">wifi</span>
<span class="material-icons-outlined text-sm">battery_full</span>
</div>
</div>
<header class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/10 px-4 py-3 flex items-center justify-between">
<button class="text-white/60 hover:text-white font-medium px-2 py-1 transition-colors">
                Cancel
            </button>
<h1 class="text-xs font-bold tracking-[0.2em] uppercase opacity-40">New Post</h1>
<button class="bg-white text-black px-5 py-1.5 rounded-full font-bold text-sm hover:opacity-90 transition-opacity">
                Publish
            </button>
</header>
<main class="flex-grow flex flex-col px-6 py-8">
<div class="mb-6">
<input class="w-full text-4xl font-bold border-none focus:ring-0 p-0 placeholder-white/20 bg-transparent text-white" placeholder="Title" type="text"/>
</div>
<div class="flex items-center space-x-3 mb-8">
<div class="w-8 h-8 rounded-full overflow-hidden bg-white/10">
<img alt="User profile" class="w-full h-full object-cover grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTV7Dvn6cgWKw0LU9cGqW29h82Q4Peji_eqYaWk18RME4K8RGKjpVrJTJ2Hs92jMvz5hd4f5IGiK5NDgGZLz5arG6KBwGcv11BcbPyhubzYO9JzgGAryaovXzxZ7W32vLb6MitTuTHdK6PALKSzs3EHjTbusKRgIvmbVm_eUIZ8-zUqTq3zGyz_Z2rtaLBdmt-tHE5gHwU-Zz5pqMEItmQytR6EJ5FAj2w-W214yP2oCD7urWAbae6DUCaz7EG46OBc4MSwglY7Mo"/>
</div>
<div class="flex flex-col">
<span class="text-xs font-semibold text-white/70">Alex Rivers</span>
<span class="text-[10px] text-white/40 uppercase tracking-wider">Public Feed</span>
</div>
</div>
<div class="flex-grow">
<textarea class="w-full h-full text-lg leading-relaxed border-none focus:ring-0 p-0 placeholder-white/20 bg-transparent text-white/90 resize-none" placeholder="Start writing..."></textarea>
</div>
</main>
<footer class="border-t border-white/10 bg-black p-4 flex items-center justify-between">
<div class="flex items-center space-x-6 text-white/40">
<button class="hover:text-white transition-colors">
<span class="material-icons-outlined">format_bold</span>
</button>
<button class="hover:text-white transition-colors">
<span class="material-icons-outlined">format_italic</span>
</button>
<button class="hover:text-white transition-colors">
<span class="material-icons-outlined">link</span>
</button>
<button class="hover:text-white transition-colors">
<span class="material-icons-outlined">image</span>
</button>
<button class="hover:text-white transition-colors">
<span class="material-icons-outlined">format_list_bulleted</span>
</button>
</div>
<div class="flex items-center space-x-2">
<span class="text-[10px] font-medium text-white/30 uppercase tracking-[0.15em]">Saved</span>
<div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
</div>
</footer>
<div class="flex justify-center pb-2 pt-1 bg-black">
<div class="w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
</div>

</body></html>
